<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard - GitHub Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #58a6ff;
            --secondary: #3fb950;
            --tertiary: #f85149;
            --neutral-dark: #0d1117;
            --neutral-card: #161b22;
            --neutral-border: #30363d;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--neutral-dark);
            color: #c9d1d9;
            margin: 0;
            overflow: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-label { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            animation: marquee 30s linear infinite;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Tailwind config for the single file */
        @layer base {
            .bg-primary { background-color: var(--primary); }
            .text-primary { color: var(--primary); }
            .bg-secondary { background-color: var(--secondary); }
            .text-secondary { color: var(--secondary); }
            .bg-tertiary { background-color: var(--tertiary); }
            .text-tertiary { color: var(--tertiary); }
            .bg-neutral-dark { background-color: var(--neutral-dark); }
            .bg-neutral-card { background-color: var(--neutral-card); }
            .border-neutral-border { border-color: var(--neutral-border); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#58a6ff',
                        secondary: '#3fb950',
                        tertiary: '#f85149',
                        neutral: {
                            dark: '#0d1117',
                            card: '#161b22',
                            border: '#30363d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer 
        } = Recharts;

        // --- Data Service ---
        const INITIAL_ASSETS = [
            { id: 'sp500', name: 'S&P 500', symbol: 'SPX', tvSymbol: 'FOREXCOM:SPXUSD', value: 5250.00, category: 'Indices' },
            { id: 'nasdaq100', name: 'Nasdaq 100', symbol: 'NDX', tvSymbol: 'FOREXCOM:NSXUSD', value: 18300.00, category: 'Indices' },
            { id: 'usdeur', name: 'USD/EUR', symbol: 'USDEUR', tvSymbol: 'FX_IDC:USDEUR', value: 0.9215, category: 'Forex' },
            { id: 'btcusd', name: 'Bitcoin', symbol: 'BTCUSD', tvSymbol: 'BITSTAMP:BTCUSD', value: 65000.00, category: 'Crypto' },
            { id: 'ethusd', name: 'Ethereum', symbol: 'ETHUSD', tvSymbol: 'BITSTAMP:ETHUSD', value: 3500.00, category: 'Crypto' },
            { id: 'usdbrl', name: 'USD/BRL', symbol: 'USDBRL', tvSymbol: 'FX_IDC:USDBRL', value: 5.3100, category: 'Forex' },
            { id: 'dxy', name: 'Dólar Index', symbol: 'DXY', tvSymbol: 'FXOPEN:DXY', value: 104.45, category: 'Indices' },
            { id: 'ewz', name: 'iShares MSCI Brazil', symbol: 'EWZ', tvSymbol: 'AMEX:EWZ', value: 31.45, category: 'Stocks' },
            { id: 'blk', name: 'BlackRock', symbol: 'BLK', tvSymbol: 'NYSE:BLK', value: 820.50, category: 'Stocks' },
            { id: 'us500_fut_bb', name: 'US500 Futures', symbol: 'US500.F', tvSymbol: 'BLACKBULL:US500.F', value: 5280.00, category: 'Indices' },
            { id: 'us02y', name: 'US 2Y Yield', symbol: 'US02Y', tvSymbol: 'US02Y', value: 4.62, category: 'Yields' },
            { id: 'us10y', name: 'US 10Y Yield', symbol: 'US10Y', tvSymbol: 'US10Y', value: 4.315, category: 'Yields' },
            { id: 'bra50', name: 'BRA50', symbol: 'BRA50', tvSymbol: 'ACTIVTRADES:BRA50', value: 128500, category: 'Indices' },
            { id: 'vix', name: 'VIX Index', symbol: 'VIX', tvSymbol: 'CAPITALCOM:VIX', value: 14.12, category: 'Indices' },
            { id: 'us2000', name: 'Russell 2000', symbol: 'US2000', tvSymbol: 'US2000', value: 2100.00, category: 'Indices' },
            { id: 'ndaq_stock', name: 'Nasdaq Inc.', symbol: 'NDAQ', tvSymbol: 'NASDAQ:NDAQ', value: 62.45, category: 'Stocks' },
            { id: 'usdt_d', name: 'USDT.D', symbol: 'USDT.D', tvSymbol: 'CRYPTOCAP:USDT.D', value: 4.25, category: 'Crypto' },
            { id: 'btc_d', name: 'BTC Dominance', symbol: 'BTC.D', tvSymbol: 'CRYPTOCAP:BTC.D', value: 52.15, category: 'Crypto' },
            { id: 'usdjpy', name: 'USD/JPY', symbol: 'USDJPY', tvSymbol: 'FX_IDC:USDJPY', value: 151.45, category: 'Forex' },
            { id: 'usdgbp', name: 'USD/GBP', symbol: 'USDGBP', tvSymbol: 'FX_IDC:USDGBP', value: 0.7912, category: 'Forex' },
            { id: 'gold', name: 'Gold', symbol: 'XAUUSD', tvSymbol: 'XAUUSD', value: 2195.20, category: 'Commodities' },
            { id: 'usoil', name: 'USOIL', symbol: 'USOIL', tvSymbol: 'TVC:USOIL', value: 81.24, category: 'Commodities' },
            { id: 'vale', name: 'Vale', symbol: 'VALE', tvSymbol: 'NYSE:VALE', value: 12.45, category: 'Stocks' },
            { id: 'pbr', name: 'Petrobras', symbol: 'PBR', tvSymbol: 'NYSE:PBR', value: 15.85, category: 'Stocks' },
        ];

        const isMarketOpen = () => {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            return day >= 1 && day <= 5 && hour >= 9 && hour < 18;
        };

        // Initialize history
        INITIAL_ASSETS.forEach(asset => {
            const now = new Date();
            const openTime = new Date(now);
            openTime.setHours(9, 0, 0, 0);
            const marketOpen = isMarketOpen();
            let endTime = new Date(now);
            if (!marketOpen) {
                if (now.getHours() < 9) {
                    endTime.setDate(endTime.getDate() - 1);
                    endTime.setHours(18, 0, 0, 0);
                    openTime.setDate(openTime.getDate() - 1);
                } else {
                    endTime.setHours(18, 0, 0, 0);
                }
            }
            const points = [];
            const intervalMinutes = 15;
            let current = new Date(openTime);
            let lastValue = asset.value * (0.98 + Math.random() * 0.04);
            while (current <= endTime) {
                const change = (Math.random() - 0.5) * 0.006;
                lastValue = lastValue * (1 + change);
                points.push({
                    time: current.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    value: lastValue,
                });
                current = new Date(current.getTime() + intervalMinutes * 60000);
            }
            if (points.length > 0) points[points.length - 1].value = asset.value;
            asset.history = points;
            if (points.length > 1) {
                const firstValue = points[0].value;
                const lastValue = points[points.length - 1].value;
                asset.change = lastValue - firstValue;
                asset.changePercent = (asset.change / firstValue) * 100;
            } else {
                asset.change = 0;
                asset.changePercent = 0;
            }
        });

        // --- Components ---

        function TradingViewWidget({ symbol }) {
            const container = useRef(null);
            useEffect(() => {
                if (!container.current) return;
                container.current.innerHTML = '';
                const script = document.createElement("script");
                script.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
                script.type = "text/javascript";
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "symbol": symbol,
                    "width": "100%",
                    "height": "100%",
                    "locale": "br",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "autosize": true,
                    "largeChartUrl": ""
                });
                container.current.appendChild(script);
            }, [symbol]);

            return (
                <div className="tradingview-widget-container w-full h-full" ref={container}>
                    <div className="tradingview-widget-container__widget"></div>
                </div>
            );
        }

        function SidebarIcon({ icon: IconName, active = false, onClick, label, className }) {
            return (
                <button 
                    onClick={onClick}
                    className={`p-2 rounded-lg transition-all relative group ${
                        active ? "text-primary bg-primary/10" : "text-gray-500 hover:text-primary hover:bg-primary/5"
                    } ${className || ""}`}
                >
                    <i data-lucide={IconName} size="20"></i>
                    {active && <div className="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-primary rounded-r-full" />}
                    <div className="absolute left-full ml-4 px-2 py-1 bg-neutral-card border border-neutral-border rounded text-[10px] opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-50 font-label uppercase">
                        {label}
                    </div>
                </button>
            );
        }

        function App() {
            const [assets, setAssets] = useState(INITIAL_ASSETS);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [marketOpen, setMarketOpen] = useState(isMarketOpen());
            const [isSearchVisible, setIsSearchVisible] = useState(false);

            useEffect(() => {
                lucide.createIcons();
                const interval = setInterval(() => setMarketOpen(isMarketOpen()), 60000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isSidebarOpen, isSearchVisible, selectedCategory]);

            const filteredAssets = useMemo(() => {
                return assets.filter(asset => {
                    const matchesSearch = asset.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                         asset.symbol.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = selectedCategory ? asset.category === selectedCategory : true;
                    return matchesSearch && matchesCategory;
                });
            }, [assets, searchQuery, selectedCategory]);

            const categories = Array.from(new Set(assets.map(a => a.category)));

            return (
                <div className="flex flex-col h-screen bg-neutral-dark text-white overflow-hidden">
                    {/* Ticker at Top */}
                    <header className="h-8 bg-neutral-card border-b border-neutral-border flex items-center px-6 gap-8 overflow-hidden z-20">
                        <div className="flex items-center gap-2 whitespace-nowrap">
                            <span className="text-[10px] font-label text-gray-500 uppercase">System Status:</span>
                            <span className="text-[10px] font-label text-secondary uppercase font-bold">Operational</span>
                        </div>
                        <div className="flex-1 flex items-center gap-6 overflow-hidden">
                            <div className="flex items-center gap-4 animate-marquee whitespace-nowrap">
                                {assets.map(asset => (
                                    <div key={asset.id} className="flex items-center gap-2">
                                        <span className="text-[10px] font-label text-gray-400">{asset.symbol}</span>
                                        <span className={`text-[10px] font-label font-bold ${asset.change >= 0 ? "text-secondary" : "text-tertiary"}`}>
                                            {asset.value.toFixed(asset.category === 'Forex' ? 4 : 2)}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="text-[10px] font-label text-gray-500">
                            {new Date().toLocaleTimeString()} UTC
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className={`bg-neutral-card border-r border-neutral-border transition-all duration-300 flex flex-col items-center py-4 gap-4 ${isSidebarOpen ? "w-16" : "w-0 overflow-hidden opacity-0"}`}>
                            <div className="w-8 h-8 bg-primary flex items-center justify-center mb-2 cursor-pointer" onClick={() => setIsSidebarOpen(!isSidebarOpen)}>
                                <i data-lucide="activity" className="text-neutral-dark"></i>
                            </div>
                            
                            <nav className="flex flex-col gap-2 flex-1 items-center">
                                <SidebarIcon icon="layout-dashboard" active={selectedCategory === null && !searchQuery} onClick={() => { setSelectedCategory(null); setSearchQuery(''); }} label="Dashboard" />
                                <div className="w-8 h-px bg-neutral-border my-1" />
                                <SidebarIcon icon="search" active={isSearchVisible} onClick={() => setIsSearchVisible(!isSearchVisible)} label="Search" />
                                <div className="w-8 h-px bg-neutral-border my-1" />
                                <SidebarIcon icon="bar-chart-3" active={selectedCategory === 'Indices'} onClick={() => setSelectedCategory(selectedCategory === 'Indices' ? null : 'Indices')} label="Indices" />
                                <SidebarIcon icon="coins" active={selectedCategory === 'Forex'} onClick={() => setSelectedCategory(selectedCategory === 'Forex' ? null : 'Forex')} label="Forex" />
                                <SidebarIcon icon="bitcoin" active={selectedCategory === 'Crypto'} onClick={() => setSelectedCategory(selectedCategory === 'Crypto' ? null : 'Crypto')} label="Crypto" />
                                <SidebarIcon icon="building-2" active={selectedCategory === 'Stocks'} onClick={() => setSelectedCategory(selectedCategory === 'Stocks' ? null : 'Stocks')} label="Stocks" />
                                <SidebarIcon icon="percent" active={selectedCategory === 'Yields'} onClick={() => setSelectedCategory(selectedCategory === 'Yields' ? null : 'Yields')} label="Yields" />
                                <SidebarIcon icon="package" active={selectedCategory === 'Commodities'} onClick={() => setSelectedCategory(selectedCategory === 'Commodities' ? null : 'Commodities')} label="Commodities" />
                                <div className="w-8 h-px bg-neutral-border my-1" />
                                <div className="relative group">
                                    <div className={`w-3 h-3 rounded-full border border-neutral-border transition-all ${marketOpen ? "bg-secondary animate-pulse" : "bg-tertiary"}`} />
                                    <div className="absolute left-full ml-4 px-2 py-1 bg-neutral-card border border-neutral-border rounded text-[10px] opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-50 font-label uppercase">
                                        Market: {marketOpen ? 'Open' : 'Closed'}
                                    </div>
                                </div>
                                <SidebarIcon icon="rotate-ccw" onClick={() => setAssets([...INITIAL_ASSETS])} label="Reset Order" />
                                <SidebarIcon icon="plus" className="bg-primary text-neutral-dark hover:bg-primary/90" label="Trade" />
                            </nav>

                            <div className="flex flex-col gap-2">
                                <SidebarIcon icon="settings" label="Settings" />
                                <SidebarIcon icon="user" label="Profile" />
                            </div>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 flex flex-col overflow-hidden relative">
                            {isSearchVisible && (
                                <div className="absolute top-4 left-4 right-4 z-30">
                                    <div className="relative max-w-md mx-auto">
                                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" size="16"></i>
                                        <input 
                                            autoFocus
                                            type="text" 
                                            placeholder="Search assets..."
                                            className="w-full bg-neutral-card border border-neutral-border rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:border-primary transition-colors text-sm shadow-2xl"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                        <button onClick={() => { setIsSearchVisible(false); setSearchQuery(''); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
                                            <i data-lucide="x" size="16"></i>
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="flex-1 overflow-y-auto scroll-smooth">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-px bg-neutral-border border-b border-neutral-border">
                                    {filteredAssets.map((asset) => (
                                        <div key={asset.id} className="bg-neutral-card h-[200px] overflow-hidden">
                                            <TradingViewWidget symbol={asset.tvSymbol} />
                                        </div>
                                    ))}
                                </div>

                                <div className="p-4 space-y-4">
                                    <section className="bg-neutral-card border border-neutral-border p-4">
                                        <div className="flex items-center justify-between mb-4">
                                            <div>
                                                <h2 className="text-lg font-bold">Performance Delta</h2>
                                                <p className="text-[10px] text-gray-400">Comparative analysis of top indices</p>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-2 h-2 rounded-full bg-primary" />
                                                    <span className="text-[10px] font-mono">S&P 500</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="w-2 h-2 rounded-full bg-tertiary" />
                                                    <span className="text-[10px] font-mono">DXY</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="h-[120px] w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={(assets.find(a => a.id === 'sp500')?.history || []).map((h, i) => ({
                                                    time: h.time,
                                                    sp500: h.value,
                                                    dxy: (assets.find(a => a.id === 'dxy')?.history[i]?.value || 0) * 50
                                                }))}>
                                                    <defs>
                                                        <linearGradient id="colorSp" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#58a6ff" stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor="#58a6ff" stopOpacity={0}/>
                                                        </linearGradient>
                                                        <linearGradient id="colorDxy" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#f85149" stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor="#f85149" stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="#30363d" vertical={false} />
                                                    <XAxis dataKey="time" stroke="#484f58" fontSize={10} tickLine={false} axisLine={false} interval={4} />
                                                    <YAxis hide domain={['auto', 'auto']} />
                                                    <Tooltip contentStyle={{ backgroundColor: '#0d1117', border: '1px solid #30363d', borderRadius: '8px' }} />
                                                    <Area type="monotone" dataKey="sp500" stroke="#58a6ff" fillOpacity={1} fill="url(#colorSp)" strokeWidth={2} />
                                                    <Area type="monotone" dataKey="dxy" stroke="#f85149" fillOpacity={1} fill="url(#colorDxy)" strokeWidth={2} />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
