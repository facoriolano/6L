<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabricio - Dashboard Pro</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Global font */
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Grid container fluid + padding controlado */
    #grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      grid-gap: 0.25rem;
      margin: 0;
      padding: 0;
    }

    /* Widget root */
    .widget {
      cursor: grab;
      min-height: 0;
      border-radius: 0.75rem;
      background-color: #0a0a0a;
      border: none;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      transition: transform 0.3s ease-in-out, box-shadow 0.15s ease-in-out;
      overflow: hidden;
    }

    .widget:active {
      cursor: grabbing;
      transform: scale(1.005);
    }

    /* Conteúdo interno do widget (iframe) */
    .widget-content {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .widget-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
    }

    /* Sortable ghost */
    .sortable-ghost {
      opacity: 0.4;
      background-color: #334155;
      border: 2px dashed #64748b;
    }

    /* Tooltip */
    .tooltip {
      position: relative;
      display: inline-block;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 120px;
      background-color: #1e293b;
      color: #fff;
      text-align: center;
      border-radius: 6px;
      padding: 5px 0;
      position: absolute;
      z-index: 100;
      bottom: 125%;
      left: 50%;
      margin-left: -60px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      font-size: 0.75rem;
    }

    .tooltip .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-dark': '#0f172a',
            'secondary-dark': '#1e293b',
            'accent': '#64748b',
            'accent-light': '#94a3b8'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-neutral-950 text-gray-100 min-h-screen">

  <!-- Modal de confirmação -->
  <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center z-50 transition-opacity duration-300">
    <div class="bg-slate-900 p-6 rounded-xl shadow-2xl w-80 border border-slate-700">

      <div class="flex justify-end space-x-3">
        <button id="cancelReset" class="px-4 py-2 bg-slate-700 text-gray-300 rounded-lg hover:bg-slate-600 transition">Cancelar</button>
        <button id="confirmReset" class="px-4 py-2 bg-black text-gray-300 rounded-lg border border-slate-700 hover:bg-slate-800 transition">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Ticker Tape -->
  <div class="tradingview-widget-container p-3 sm:p-4 border-b border-slate-700 bg-neutral-950">
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
      "symbols": [
        {"proName": "FOREXCOM:SPXUSD", "title": "S&P 500"},
        {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
        {"proName": "FX_IDC:USDBRL", "title": "USD/BRL"},
        {"proName": "BITSTAMP:BTCUSD", "title": "Bitcoin"},
        {"proName": "BITSTAMP:ETHUSD", "title": "Ethereum"},
        {"proName": "US500.F", "title": "S&P 500 Index"},
        {"proName": "US10Y", "title": "US 10Y Yield"},
        {"proName": "XAUUSD", "title": "Gold"},
        {"proName": "TVC:USOIL", "title": "Oil"},
        {"proName": "NYSE:VALE", "title": "Vale"},
        {"proName": "NYSE:PBR", "title": "Petrobras"}
      ],
      "showSymbolLogo": true,
      "colorTheme": "dark",
      "isTransparent": false,
      "displayMode": "adaptive",
      "locale": "en"
    }
    </script>
  </div>

  <!-- Content main -->
  <main class="p-4 space-y-4">

    <!-- GRID DE WIDGETS -->
    <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-2 sm:gap-3 md:gap-4"></div>

    <!-- NOTÍCIAS E HEATMAP -->
    <div class="flex flex-col lg:flex-row gap-4">
      <div class="flex-1 bg-neutral-950 rounded-xl shadow-lg transition hover:shadow-xl hover:shadow-accent/20 duration-300 min-h-[600px] lg:min-h-[800px] flex flex-col">
        <div class="p-1 bg-neutral-950 rounded-t-xl text-lg font-semibold text-gray-300 border-b border-slate-700 flex-shrink-0">Notícias e Calendário</div>
        <iframe class="w-full h-full flex-grow" src="https://facoriolano.github.io/widget-tradingview/tvnews2.html" title="Notícias"></iframe>
      </div>

      <div class="flex-1 bg-neutral-950 rounded-xl shadow-lg transition hover:shadow-xl hover:shadow-accent/20 duration-300 min-h-[600px] lg:min-h-[800px] flex flex-col">
        <div class="p-1 bg-neutral-950 rounded-t-xl text-lg font-semibold text-gray-300 border-b border-slate-700 flex-shrink-0">Mapa de Calor (Heatmap)</div>
        <iframe class="w-full h-full flex-grow" src="https://facoriolano.github.io/widget-tradingview/heat1.html" title="Mapa de Calor"></iframe>
      </div>

  </main>

  <!-- FAB de reset -->
  <div class="fixed bottom-6 right-6 z-40 tooltip">
    <button id="resetButton"
      class="p-3 text-lg font-medium text-gray-400 bg-slate-800 rounded-full border border-slate-700 shadow-xl 
             hover:text-white hover:bg-slate-700 transition duration-150 ease-in-out hover:scale-110">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0h5m-5 0L7.171 7.171m0 0L4 4" />
      </svg>
    </button>
    <span class="tooltiptext">Resetar Ordem dos Gráficos</span>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      signInWithCustomToken
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- CONFIGURAÇÕES GLOBAIS ---
    const initialSymbols = [
      "FX_IDC:USDBRL", "FXOPEN:DXY", "US10Y", "AMEX:EWZ", "ACTIVTRADES:BRA50",
      "NYSE:PBR", "NYSE:VALE", "CAPITALCOM:VIX", "BITSTAMP:BTCUSD", "CRYPTOCAP:USDT.D", "US500.F",
      "FOREXCOM:SPXUSD", "NASDAQ:NDAQ", "BLACKBULL:NAS100", "US2000", "US02Y",
      "XAUUSD", "TVC:USOIL", "FX_IDC:USDJPY", "FX_IDC:USDEUR",
      "FX_IDC:USDGBP", "NYSE:BLK", "BITSTAMP:ETHUSD", "BINANCE:SOLUSD", "CRYPTOCAP:SOL", "NASDAQ:TSLA", "EIGHTCAP:QQQ"
    ];

    let symbols = [...initialSymbols];
    const gridContainer = document.getElementById("grid-container");
    const resetButton = document.getElementById("resetButton");

    // Firebase (se vier)
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
    let db = null;
    let auth = null;
    let userId = null;
    let isAuthReady = false;

    const DB_PATH = (uid) => `artifacts/${appId}/users/${uid}/dashboardData/widgetOrder`;

    // --- SALVAR / CARREGAR ORDEM ---
    async function saveWidgetOrder(order) {
      if (!isAuthReady || !db || !userId) return;

      try {
        const docRef = doc(db, DB_PATH(userId));
        await setDoc(docRef, { order: order });
        console.log("Ordem salva no Firestore.");
      } catch (error) {
        console.error("Erro ao salvar ordem:", error);
      }
    }

    async function loadSavedOrder() {
      if (!isAuthReady || !db || !userId) return;

      try {
        const docRef = doc(db, DB_PATH(userId));
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const saved = docSnap.data().order;
          if (Array.isArray(saved) && saved.length > 0) {
            symbols = saved;
          }
        } else {
          const savedJSON = localStorage.getItem('widgetOrder');
          if (savedJSON) {
            const saved = JSON.parse(savedJSON);
            if (Array.isArray(saved) && saved.length > 0) {
              symbols = saved;
              saveWidgetOrder(symbols);
              localStorage.removeItem('widgetOrder');
            }
          }
        }
      } catch (error) {
        console.error("Erro ao carregar ordem:", error);
      }
    }

    // --- CRIAR WIDGET DINAMICAMENTE (com altura configurável) ---
    function createWidget(symbol, config = {}) {
      const { height = 200, cols = 1 } = config; // altura em px e colunas que ocupa

      const widget = document.createElement("div");
      widget.className = "widget bg-neutral-950 rounded-xl shadow-lg transition transform hover:scale-[1.01] hover:shadow-xl hover:shadow-accent/20 duration-300";
      widget.dataset.symbol = symbol;
      widget.style.minHeight = `${height}px`;
      widget.style.gridColumn = `span ${cols}`;

      const content = document.createElement("div");
      content.className = "widget-content";
      content.style.height = `${height}px`;

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.async = true;
      script.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";

      script.textContent = JSON.stringify({
        symbol,
        width: "100%",
        height: "100%",
        colorTheme: "dark",
        isTransparent: false,
        dateRange: "1D",
        interval: "D",
        autosize: true
      });

      content.appendChild(script);
      widget.appendChild(content);
      gridContainer.appendChild(widget);

      return widget;
    }

    function loadWidgets() {
      gridContainer.innerHTML = "";

      // Exemplo de widgets com altura e coluna customizada
      const layout = [
        { symbol: "FX_IDC:USDBRL", height: 200, cols: 1 },
        { symbol: "BITSTAMP:BTCUSD", height: 220, cols: 1 },
        { symbol: "US10Y", height: 200, cols: 1 },
        { symbol: "US500.F", height: 200, cols: 2 },
        { symbol: "NASDAQ:NDAQ", height: 200, cols: 1 },
        { symbol: "XAUUSD", height: 200, cols: 1 },
        { symbol: "TVC:USOIL", height: 200, cols: 1 },
        { symbol: "NYSE:VALE", height: 200, cols: 1 },
        { symbol: "NYSE:PBR", height: 200, cols: 1 },
        { symbol: "FOREXCOM:SPXUSD", height: 200, cols: 2 }
      ];

      layout.forEach(({ symbol, height, cols }) => {
        createWidget(symbol, { height, cols });
      });

      // Se quiser, use o `symbols` carregado do Firestore para manter ordem
      // ou sinônimo, você pode reordenar `layout` conforme `symbols` se quiser.
    }

    function initializeSortable() {
      new Sortable(gridContainer, {
        animation: 150,
        handle: ".widget",
        ghostClass: "sortable-ghost",
        onEnd: () => {
          const newOrder = Array.from(gridContainer.querySelectorAll(".widget")).map(w => w.dataset.symbol);
          symbols = newOrder;
          saveWidgetOrder(newOrder);
        }
      });
    }

    // --- RESET (com modal) ---
    window.resetWidgetOrder = function() {
      const modal = document.getElementById('confirmModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      document.getElementById('cancelReset').onclick = () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      };

      document.getElementById('confirmReset').onclick = async () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        await saveWidgetOrder(initialSymbols);
        localStorage.removeItem('widgetOrder');
        resetButton.disabled = true;
        resetButton.innerHTML += '<span id
